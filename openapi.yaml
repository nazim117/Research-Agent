openapi: "3.0.3"
info:
  title: research-agent
  version: "1.0.0"
  description: Local-first project-brain assistant API.

servers:
  - url: http://localhost:8000

tags:
  - name: projects
    description: Project CRUD and PM integration sync
  - name: chat
    description: Conversational interface to the project brain
  - name: ingest
    description: Document and URL ingestion pipeline
  - name: actions
    description: Human-approval flow for AI-proposed actions
  - name: studio
    description: Extracted decisions, risks, action items, briefings, and standups
  - name: memory
    description: Semantic search over conversation memory

paths:
  /health:
    get:
      summary: Liveness check
      operationId: health
      responses:
        "200":
          description: Service is running
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /projects:
    get:
      tags: [projects]
      summary: List all projects
      operationId: listProjects
      responses:
        "200":
          description: Array of projects, newest first
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
    post:
      tags: [projects]
      summary: Create a project
      operationId: createProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectCreateRequest"
      responses:
        "201":
          description: Created project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "409":
          description: A project with that name already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /projects/{project_id}:
    patch:
      tags: [projects]
      summary: Partial update of a project
      operationId: patchProject
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectUpdateRequest"
      responses:
        "200":
          description: Updated project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Project not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Name already taken
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      tags: [projects]
      summary: Delete a project and all its state
      operationId: deleteProject
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: Project deleted
          content:
            application/json:
              schema:
                type: object
                required: [deleted]
                properties:
                  deleted:
                    type: boolean
        "404":
          description: Project not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /projects/{project_id}/sync:
    post:
      tags: [projects]
      summary: Sync PM integrations into the project RAG store
      operationId: syncProject
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: Sync results per external ref
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncResult"
        "400":
          description: No external_refs configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Project not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: PM API unreachable or returned an error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    get:
      tags: [projects]
      summary: Get last-synced timestamps per external ref
      operationId: getSyncStatus
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: Sync status per ref
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncStatus"
        "404":
          description: Project not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /projects/{project_id}/actions:
    post:
      tags: [actions]
      summary: Propose a pending action for human approval
      operationId: proposeAction
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProposeActionRequest"
      responses:
        "200":
          description: Created pending action
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Action"
        "400":
          description: Invalid action_type or payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Project not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    get:
      tags: [actions]
      summary: List actions for a project
      operationId: listActions
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ActionStatus"
      responses:
        "200":
          description: List of actions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Action"

  /actions/{action_id}/approve:
    post:
      tags: [actions]
      summary: Approve and execute a pending action
      operationId: approveAction
      parameters:
        - $ref: "#/components/parameters/ActionId"
      responses:
        "200":
          description: Action executed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Action"
        "400":
          description: Action is not pending
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Action not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: Integration call failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /actions/{action_id}/reject:
    post:
      tags: [actions]
      summary: Reject a pending action
      operationId: rejectAction
      parameters:
        - $ref: "#/components/parameters/ActionId"
      responses:
        "200":
          description: Action rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Action"
        "400":
          description: Action cannot be rejected in its current state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Action not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /chat:
    post:
      tags: [chat]
      summary: Send a message to the project brain
      description: >
        `project_id` is passed in the request body (not the path) because chat
        is a stateless endpoint — the caller owns the session and can switch
        projects between turns without changing the URL.
      operationId: chat
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
      responses:
        "200":
          description: Assistant reply with optional citations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResponse"
        "404":
          description: Project not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: LLM or embedding service unreachable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /ingest:
    post:
      tags: [ingest]
      summary: Ingest a document (chunk + embed)
      description: >
        `project_id` is passed in the request body so ingest can be called
        without a project-scoped path, matching the same convention as /chat.
      operationId: ingest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IngestRequest"
      responses:
        "200":
          description: Number of chunks stored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestResponse"
        "404":
          description: Project not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: Embedding service unreachable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /ingest/transcript:
    post:
      tags: [ingest]
      summary: Ingest a pasted transcript (chunk + extract decisions/actions/risks)
      operationId: ingestTranscript
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IngestTranscriptRequest"
      responses:
        "200":
          description: Ingest counts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestTranscriptResponse"
        "404":
          description: Project not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: LLM or embedding service unreachable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /ingest/file:
    post:
      tags: [ingest]
      summary: Upload and ingest a file
      operationId: ingestFile
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [project_id, file]
              properties:
                project_id:
                  type: string
                  format: uuid
                kind:
                  type: string
                  enum: [document, transcript]
                  default: document
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: Ingest counts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestTranscriptResponse"
        "400":
          description: Unsupported file type
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Project not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: LLM or embedding service unreachable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /ingest/url:
    post:
      tags: [ingest]
      summary: Fetch and ingest content at a URL
      operationId: ingestUrl
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [project_id, url]
              properties:
                project_id:
                  type: string
                  format: uuid
                url:
                  type: string
                  format: uri
                kind:
                  type: string
                  enum: [document, transcript]
                  default: document
      responses:
        "200":
          description: Ingest counts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestTranscriptResponse"
        "400":
          description: URL not reachable or content not extractable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Project not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: LLM or embedding service unreachable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /projects/{project_id}/decisions:
    get:
      tags: [studio]
      summary: List decisions extracted from transcripts
      operationId: listDecisions
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: List of decisions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Decision"
        "404":
          description: Project not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /projects/{project_id}/action-items:
    get:
      tags: [studio]
      summary: List transcript action items
      operationId: listActionItems
      parameters:
        - $ref: "#/components/parameters/ProjectId"
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [open, done]
      responses:
        "200":
          description: List of action items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActionItem"
        "404":
          description: Project not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /projects/{project_id}/risks:
    get:
      tags: [studio]
      summary: List risks extracted from transcripts
      operationId: listRisks
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: List of risks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Risk"
        "404":
          description: Project not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /projects/{project_id}/briefing:
    get:
      tags: [studio]
      summary: Project status snapshot with AI summary
      operationId: getBriefing
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: Briefing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Briefing"
        "404":
          description: Project not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: LLM unreachable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /projects/{project_id}/standup:
    get:
      tags: [studio]
      summary: Daily standup (Yesterday / Today / Blockers)
      operationId: getStandup
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: Standup
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Standup"
        "404":
          description: Project not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: LLM unreachable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /projects/{project_id}/sources:
    get:
      tags: [studio]
      summary: List ingested document sources with chunk counts
      operationId: listSources
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: List of sources
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Source"
        "404":
          description: Project not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /memory/search:
    get:
      tags: [memory]
      summary: Semantic search over conversation memory
      description: >
        `project_id` is a query parameter (not a path segment) because memory
        search is a cross-cutting utility, not a sub-resource of a single project.
      operationId: memorySearch
      parameters:
        - name: project_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: k
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 20
            default: 5
      responses:
        "200":
          description: Memory hits
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MemoryHit"
        "404":
          description: Project not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  parameters:
    ProjectId:
      name: project_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ActionId:
      name: action_id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          description: Machine-readable error identifier.
          example: not_found
        message:
          type: string
          description: Human-readable explanation.
          example: Project not found

    Project:
      type: object
      required: [id, name, created_at]
      properties:
        id:
          type: string
          format: uuid
          description: Stable UUID assigned at creation.
        name:
          type: string
          description: Human-readable project name.
        created_at:
          type: string
          format: date-time
          description: ISO 8601 UTC timestamp (e.g. "2026-04-18T11:08:07Z").
        external_refs:
          type: object
          additionalProperties: true
          nullable: true
          description: Bag of PM references (jira_project_key, github_repo, ...).

    ProjectCreateRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        external_refs:
          type: object
          additionalProperties: true
          default: {}

    ProjectUpdateRequest:
      type: object
      properties:
        name:
          type: string
          nullable: true
        external_refs:
          type: object
          additionalProperties: true
          nullable: true

    SyncResult:
      type: object
      required: [synced]
      description: Number of items synced per external ref key.
      properties:
        synced:
          type: integer
          description: Total items written to the RAG store.
          example: 42
        detail:
          type: object
          additionalProperties:
            type: integer
          description: Per-ref breakdown (e.g. {"jira_project_key":42}).
          example:
            jira_project_key: 42

    SyncStatus:
      type: object
      description: Last-synced timestamp per external ref key.
      additionalProperties:
        type: string
        format: date-time
        nullable: true
      example:
        jira_project_key: "2026-06-01T09:00:00Z"
        github_repo: null

    ActionStatus:
      type: string
      enum: [pending, executing, executed, rejected, failed]
      description: >
        Lifecycle of a human-approval action:
        pending → executing → executed (happy path);
        pending → rejected (human says no);
        executing → failed (integration error).

    ProposeActionRequest:
      type: object
      required: [action_type, payload]
      properties:
        action_type:
          type: string
        payload:
          type: object
          additionalProperties: true

    Action:
      type: object
      required: [id, project_id, action_type, status, payload, created_at]
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        action_type:
          type: string
        status:
          $ref: "#/components/schemas/ActionStatus"
        payload:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
          nullable: true

    ChatRequest:
      type: object
      required: [project_id, session_id, message]
      properties:
        project_id:
          type: string
          format: uuid
        session_id:
          type: string
        message:
          type: string

    ChatResponse:
      type: object
      required: [reply]
      properties:
        reply:
          type: string
        citations:
          type: array
          items:
            $ref: "#/components/schemas/Citation"

    Citation:
      type: object
      required: [ref, source, chunk_index]
      properties:
        ref:
          type: integer
        source:
          type: string
        chunk_index:
          type: integer

    IngestRequest:
      type: object
      required: [project_id, source, text]
      properties:
        project_id:
          type: string
          format: uuid
        source:
          type: string
        text:
          type: string

    IngestResponse:
      type: object
      required: [chunks]
      properties:
        chunks:
          type: integer

    IngestTranscriptRequest:
      type: object
      required: [project_id, source, text]
      properties:
        project_id:
          type: string
          format: uuid
        source:
          type: string
        text:
          type: string

    IngestTranscriptResponse:
      type: object
      required: [chunks, decisions, action_items, risks]
      properties:
        chunks:
          type: integer
        decisions:
          type: integer
        action_items:
          type: integer
        risks:
          type: integer

    Decision:
      type: object
      required: [id, source, text, created_at]
      properties:
        id:
          type: string
          format: uuid
        source:
          type: string
        text:
          type: string
        created_at:
          type: string
          format: date-time

    ActionItem:
      type: object
      required: [id, source, text, status, created_at]
      properties:
        id:
          type: string
          format: uuid
        source:
          type: string
        owner:
          type: string
          nullable: true
        text:
          type: string
        due_date:
          type: string
          nullable: true
        status:
          type: string
          enum: [open, done]
        created_at:
          type: string
          format: date-time

    Risk:
      type: object
      required: [id, source, text, created_at]
      properties:
        id:
          type: string
          format: uuid
        source:
          type: string
        text:
          type: string
        created_at:
          type: string
          format: date-time

    Briefing:
      type: object
      required: [summary, open_actions, recent_decisions, active_risks, generated_at]
      properties:
        summary:
          type: string
        open_actions:
          type: array
          items:
            type: object
        recent_decisions:
          type: array
          items:
            type: object
        active_risks:
          type: array
          items:
            type: object
        generated_at:
          type: string
          format: date-time

    Standup:
      type: object
      required: [summary, done, today, blockers, generated_at]
      properties:
        summary:
          type: string
        done:
          type: array
          items:
            type: string
        today:
          type: array
          items:
            type: string
        blockers:
          type: array
          items:
            type: string
        generated_at:
          type: string
          format: date-time

    Source:
      type: object
      required: [source, chunks]
      properties:
        source:
          type: string
        chunks:
          type: integer

    MemoryHit:
      type: object
      required: [score, role, content, session_id]
      properties:
        score:
          type: number
          format: float
        role:
          type: string
        content:
          type: string
        session_id:
          type: string
