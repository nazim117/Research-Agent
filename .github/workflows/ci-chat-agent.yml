name: CI - Chat Agent

on:
  push:
    branches: [ "main" ]
    paths:
      - 'services/chat-agent/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'services/chat-agent/**'

concurrency:
  group: ci-chat-agent-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/chat-agent
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: services/chat-agent/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt ruff

      - name: Lint with ruff
        run: ruff check .

      - name: Run unit tests
        env:
          DEEPSEEK_API_KEY: dummy-key-for-ci
        run: pytest tests/ -v -m "not integration and not e2e"

  integration:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/chat-agent

    # Qdrant runs as a Docker service container on the same network as the job.
    # No --health-cmd: the Qdrant image has no curl/wget, so the built-in
    # health-check always fails. We poll from the runner in the step below.
    services:
      qdrant:
        image: qdrant/qdrant:v1.12.1
        ports:
          - 6333:6333

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: services/chat-agent/requirements.txt

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Wait for Qdrant
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:6333/collections && break || sleep 2
          done

      # Ollama is not installed: model pulls are multi-GB and slow.
      # Tests that require Ollama (embeddings, RAG, LLM) detect the missing
      # service via the ollama_up fixture and skip themselves automatically.

      # Build and start the mcp-server (no vendor credentials — Jira/GitHub
      # tools will return isError=true, which is exactly the path we test).
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: services/mcp-server/go.sum

      - name: Start mcp-server
        run: go run ./cmd/server/main.go &
        working-directory: services/mcp-server
        env:
          PORT: 8083

      - name: Wait for mcp-server to be ready
        run: |
          for i in $(seq 1 15); do
            curl -sf http://localhost:8083/health && break || sleep 2
          done

      - name: Run integration tests
        env:
          QDRANT_URL: http://localhost:6333
          OLLAMA_BASE_URL: http://localhost:11434
          MCP_BASE_URL: http://localhost:8083
          OTEL_ENABLED: "false"
          METRICS_ENABLED: "false"
          DEEPSEEK_API_KEY: dummy-key-for-ci
        # Tests that cannot reach a service skip themselves — no hard failures
        # from missing infrastructure.
        run: pytest tests/ -m integration -v

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image (smoke test)
        run: docker build -t chat-agent:ci services/chat-agent
