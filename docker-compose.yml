services:
  mcp-server:
    build:
      context: ./services/mcp-server
      dockerfile: Dockerfile
    ports:
      - "8083:8083"
    # Load PM credentials from the repo-root .env so the chat-agent never
    # reads them directly.  JIRA_* and GITHUB_TOKEN stay on this service.
    # required: false — a fresh clone has no .env yet (only .env.example),
    # and everything here has a working default without it; don't hard-fail
    # docker compose up over a file that's genuinely optional.
    env_file:
      - path: .env
        required: false
    environment:
      - PORT=8083
      - BRAVE_SEARCH_API_KEY=${BRAVE_SEARCH_API_KEY:-}
      # Bundled, no-API-key web search backend — takes precedence over Brave
      # when set (see internal/tools/web.go's dispatch order).
      - SEARXNG_BASE_URL=http://searxng:8080
    depends_on:
      - searxng
    restart: unless-stopped

  dashboard:
    build: ./dashboard
    ports:
      - "5173:5173"
    # depends_on:
    #   - agent-executor

  # chat-agent — personal AI agent service (Steps 1–4 of the build plan).
  # Runs on port 8080; persists conversation history in a named Docker volume.
  chat-agent:
    build: ./services/chat-agent
    ports:
      - "8080:8080"
    # required: false — see mcp-server's identical comment above.
    env_file:
      - path: .env
        required: false
    environment:
      - PORT=8080
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-chat}
      # Store the SQLite file in the mounted volume so it survives restarts.
      - SQLITE_PATH=/data/chat.db
      # Inside Docker Compose, services find each other by service name.
      # "qdrant" resolves to the qdrant container on the shared network.
      - QDRANT_URL=http://qdrant:6333
      # Ollama runs on the host machine, not in Docker — only used for local
      # chat (Settings > LLM Models > "Local (Ollama)"), not embeddings.
      # host.docker.internal is a special DNS name that Docker resolves to the
      # host machine's IP address from inside a container.
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      # Embeddings are served by the bundled "embeddings" service below
      # (Text Embeddings Inference), not Ollama — resolved by service name.
      - EMBEDDINGS_BASE_URL=http://embeddings:80
      # PM I/O is routed through the mcp-server; chat-agent holds no vendor creds.
      - MCP_BASE_URL=http://mcp-server:8083
    volumes:
      - chat-db:/data
    depends_on:
      - qdrant
      - mcp-server
      - embeddings
    restart: unless-stopped

  # qdrant — vector database for semantic memory (Step 2+).
  # Stores message embeddings and supports similarity search.
  qdrant:
    image: qdrant/qdrant:v1.13.1
    ports:
      - "6333:6333"   # HTTP API
      - "6334:6334"   # gRPC API (not used yet, but exposed for tooling)
    volumes:
      - qdrant-data:/qdrant/storage
    restart: unless-stopped

  # embeddings — Hugging Face Text Embeddings Inference (TEI), a lightweight
  # purpose-built embedding server (not Ollama's general-purpose LLM runtime).
  # Serves BAAI/bge-base-en-v1.5 (768-dim), matching the dimension every
  # existing Qdrant collection is already created with. Originally configured
  # for nomic-ai/nomic-embed-text-v1.5, but that model's current config.json
  # on the Hub has a duplicate `max_position_embeddings` field that TEI
  # cpu-1.9's parser rejects outright (crash-loops on startup) — bge-base is
  # TEI's flagship-supported architecture (plain BERT, no custom modeling
  # code) and avoids that class of problem entirely, same dimension, same
  # zero-migration property. The model is fixed here deliberately either way:
  # changing it after documents exist would invalidate every embedded
  # document and conversation (see services/chat-agent/embeddings.py). CPU
  # image; see TEI's docs for GPU tags if your hardware/Docker setup supports
  # passthrough (not configured here).
  embeddings:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.9
    command: ["--model-id", "BAAI/bge-base-en-v1.5"]
    ports:
      - "8082:80"
    volumes:
      - tei-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s   # first start downloads the model from Hugging Face Hub
    restart: unless-stopped

  # searxng — self-hosted meta-search engine, the default web_search backend
  # for the agent (see internal/tools/web.go). No API key, no per-query cost,
  # unlike Brave — fits an open-source project's "just works" bar better.
  # The mounted settings.yml enables JSON output, which is off by default
  # (queries would otherwise 403) — see docker/searxng/settings.yml.
  searxng:
    image: searxng/searxng:latest
    ports:
      - "8085:8080"
    volumes:
      - ./docker/searxng/settings.yml:/etc/searxng/settings.yml:ro
    restart: unless-stopped

volumes:
  # Persists the SQLite database across container restarts.
  chat-db:
  # Persists Qdrant vector index across container restarts.
  qdrant-data:
  # Persists the downloaded embedding model so it isn't re-fetched every start.
  tei-data:

networks:
  default:
    name: research-ai-net
    driver: bridge
